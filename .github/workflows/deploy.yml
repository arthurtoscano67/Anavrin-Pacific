name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_API_BASE_URL: "https://anavrin-lobby.arthurtoscano67.workers.dev"
          VITE_PUBLIC_ASSET_BASE_URL: "https://anavrin-lobby.arthurtoscano67.workers.dev"
          VITE_PUBLIC_APP_BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          VITE_AVATAR_PACKAGE_ID: "0xb11df0a4846a748275694728d29ca5b32c282e4828ee4507025c0c2763803820"
          VITE_LEGACY_AVATAR_PACKAGE_IDS: "0xc83ef0057aa9e69a991cb15363de4d65546bf13f29be893b41a5d820f85adb77"
          VITE_UNITY_ASSET_VERSION: "mfps-r11"
          VITE_PHOTON_APP_ID_REALTIME: "5809aa26-84d6-48a4-a1c7-40f8ac878d31"
          VITE_PHOTON_FIXED_REGION: "usw"
        run: |
          npm run build -w @pacific/shared
          npm run build -w @pacific/web

      - name: Prepare Unity WebGL for static hosting
        run: node scripts/prepare-unity-webgl-static-hosting.mjs

      - name: SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
